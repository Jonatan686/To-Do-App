<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Student App</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #43e97b);
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
    }

    .theme-btn {
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      background: #eee;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button.add {
      background: #4facfe;
      color: white;
      border: none;
    }

    .task {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        padding: 14px;
        border-radius: 12px;
        margin-bottom: 8px;
        border: 1px solid #eee;
        transition: all 0.2s ease;
    }

    .task:hover {
        background: #f5f7fa;
        transform: none;
    }

    .task-info {
      flex: 1;
    }

    .task-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .task-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .task-title input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .progress {
      width: 100px;
    }

    .delete {
      background: red;
      color: white;
      border: none;
    }

    canvas {
      margin-top: 20px;
    }

    body.dark {
      background: #121212;
    }

    body.dark .app {
      background: #1e1e2f;
      color: white;
    }

    body.dark .task {
      background: #2c2c3c;
    }

    #authBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #4facfe, #43e97b);
}

    #authBox input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-right: 10px;
  width: 200px;
    }

    #authBox button {
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
    }

    /* 🔥 INI YANG BIKIN RAPI */
.login-card {
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  display: flex;
  gap: 10px;
  align-items: center;
}

/* Biar gak kepanjangan */
.login-card input {
  width: 200px;
}

  </style>
</head>

<body>

<div id="authBox">
  <div class="login-card">
    <input type="text" id="username" placeholder="Masukkan nama...">
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="app">

  <header>
  <h1>📚 My Tasks</h1>
  <div>
    <span id="welcome"></span>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="logout()">Logout</button>
  </div>
  </header>

  <div class="inputs">
    <input type="text" id="name" placeholder="Nama tugas">
    <input type="datetime-local" id="deadline">
    <input type="number" id="progress" placeholder="%" min="0" max="100">
    <button class="add" onclick="addTask()">Tambah</button>
  </div>

  <div id="taskList"></div>

  <canvas id="chart"></canvas>

</div>

<div class="login-card">
  <h3>Login</h3>
  <input ...>
  <button ...>
</div>

<script>
let chartInstance;

let currentUser = localStorage.getItem("currentUser") || null;
let tasks = [];

function loadTasks() {
  if (!currentUser) return;
  tasks = JSON.parse(localStorage.getItem("tasks_" + currentUser)) || [];
}

function save() {
  localStorage.setItem("tasks_" + currentUser, JSON.stringify(tasks));
}

function addTask() {
  const name = document.getElementById("name").value.trim();
  const deadline = document.getElementById("deadline").value;
  const progress = document.getElementById("progress").value;

  // Debug: cek isi input
  console.log("NAME:", name);
  console.log("DEADLINE:", deadline);

  if (name === "" || deadline === "") {
    alert("Isi dulu!");
    return;
  }

  tasks.push({
    id: Date.now(),
    name,
    deadline,
    progress: Number(progress || 0)
  });

  // reset input biar enak dipakai lagi
  document.getElementById("name").value = "";
  document.getElementById("deadline").value = "";
  document.getElementById("progress").value = "";

  save();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function updateProgress(id, val) {
  const t = tasks.find(x => x.id === id);
  t.progress = val;
  save();
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach(t => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <div class="task-info">
        <label class="task-title">
            <input type="checkbox" ${t.progress == 100 ? "checked" : ""} 
             onchange="updateProgress(${t.id}, this.checked ? 100 : 0)">
            <span class="${t.progress == 100 ? 'done' : ''}">${t.name}</span>
        </label>
        ⏰ ${formatDeadline(t.deadline)}<br>
        Progress: ${t.progress}%
      </div>

      <div class="task-actions">
        <input type="range" min="0" max="100" value="${t.progress}"
          onchange="updateProgress(${t.id}, this.value)">
        <button class="delete" onclick="deleteTask(${t.id})">❌</button>
      </div>
    `;

    list.appendChild(div);
  });

  updateChart();
}



function updateChart() {
  const canvas = document.getElementById("chart");

  if (!canvas) return; // jaga-jaga kalau canvas ga kebaca

  const ctx = canvas.getContext("2d");

  const done = tasks.filter(t => t.progress == 100).length;
  const ongoing = tasks.length - done;

  // hapus chart lama
  if (chartInstance) {
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Done", "Ongoing"],
      datasets: [{
        data: [done, ongoing]
      }]
    }
  });
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

function checkDeadline() {
  if (Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  const now = new Date();

  tasks.forEach(t => {
    const diff = new Date(t.deadline) - now;

    if (diff < 86400000 && diff > 0 && t.progress < 100) {
      new Notification("Deadline dekat!", {
        body: t.name
      });
    }
  });
}

function formatDeadline(deadline) {
  const d = new Date(deadline);
  return d.toLocaleDateString("id-ID", {
    day: "numeric",
    month: "short",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function login() {
  const username = document.getElementById("username").value.trim();

  if (!username) return alert("Isi nama dulu!");

  localStorage.setItem("currentUser", username);
  location.reload();
}

function logout() {
  localStorage.removeItem("currentUser");
  location.reload();
}

function checkLogin() {
  if (!currentUser) {
    document.getElementById("authBox").style.display = "flex";
    document.querySelector(".app").style.display = "none";
  } else {
    document.getElementById("authBox").style.display = "none";
    document.querySelector(".app").style.display = "block";
  }
}

function showUser() {
  if (currentUser) {
    document.getElementById("welcome").innerText = "Hi, " + currentUser;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  checkLogin();

  if (currentUser) {
    loadTasks();
    showUser();
    render();
  }
});

setInterval(checkDeadline, 60000);

document.addEventListener("DOMContentLoaded", render);
</script>

</body>
</html>
